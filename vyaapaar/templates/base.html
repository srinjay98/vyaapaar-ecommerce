<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ApnaCart</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand"
           href="/">

            ApnaCart 🛒

        </a>
        <form class="d-flex"
              method="GET"
              action="/">

              <input
                  class="form-control me-2"
                  type="search"
                  name="q"
                  placeholder="Search products"
    >

              <button class="btn btn-warning"
                      type="submit">

                  Search

              </button>

        </form>

        <div>

            {% if user.is_authenticated %}

                <span class="text-white me-3">

                    Hello, {{ user.username }}

                </span>

                <a href="{% url 'seller_dashboard' %}"
                   class="btn btn-outline-light me-2">

                    Seller Dashboard

                </a>

                <a href="{% url 'seller_orders_view' %}"
                   class="btn btn-outline-light me-2">

                       Seller Orders

                </a>

                <a href="{% url 'cart_view' %}"
                   class="btn btn-outline-light me-2">

                   Cart

                </a>

                <a href="{% url 'orders_view' %}"
                   class="btn btn-outline-light me-2">

                   My Orders

                </a>

                
                <a href="{% url 'wishlist_view' %}"
                   class="btn btn-outline-light me-2">

                           ❤️ Wishlist

                </a>
                

                <a href="{% url 'logout' %}"
                   class="btn btn-danger">

                    Logout

                </a>

            {% else %}

                <a href="{% url 'login' %}"
                   class="btn btn-outline-light me-2">

                    Login

                </a>

                <a href="{% url 'register' %}"
                   class="btn btn-warning">

                    Register

                </a>

            {% endif %}

        </div>

    </div>

</nav>

    <!-- Main Content -->

    <div class="container py-4">

        {% block content %}

        {% endblock %}

    </div>

</body>

</html>
