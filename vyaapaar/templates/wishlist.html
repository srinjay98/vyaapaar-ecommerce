{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">

    My Wishlist

</h2>

<div class="row">

{% for item in wishlist_items %}

<div class="col-md-4 mb-4">

    <div class="card shadow h-100">

        {% if item.product.images.first %}

        <img
            src="{{ item.product.images.first.image.url }}"
            class="card-img-top"
            style="height: 250px; object-fit: cover"
        >

        {% endif %}

        <div class="card-body">

            <h5>

                {{ item.product.name }}

            </h5>

            <p>

                ₹{{ item.product.price }}

            </p>

            <a
                href="{% url 'product_detail' item.product.id %}"
                class="btn btn-primary"
            >

                View Product

            </a>

            <br>

            <a
              href="{% url 'remove_from_wishlist' item.id %}"
              class="btn btn-danger mt-2"
>
              Remove

            </a>

        </div>

    </div>

</div>

{% empty %}

<h4>

    Wishlist is empty

</h4>

{% endfor %}

</div>

{% endblock %}
